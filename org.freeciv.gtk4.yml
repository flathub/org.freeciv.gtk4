app-id: org.freeciv.gtk4
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: freeciv-gtk4
rename-icon: freeciv-client
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --filesystem=~/.freeciv:create
modules:
  - name: freeciv-gtk4
    buildsystem: meson
    no-autogen: true
    config-opts:
      - -Dclients=gtk4
      - -Dfcmp=gtk4
      - -Dtools=[]
    sources:
      - type: archive
        url: "https://sourceforge.net/projects/freeciv/files/Freeciv 3.2/3.2.5/freeciv-3.2.5.tar.xz"
        sha256: d32808f02a9b9f49ef159bcbf266b16ce2a3ce6ea8f71115d80f952c3cc609e8
      - type: patch
        path: 0001-Mark-flathub-as-the-distributor.patch
      - type: patch
        path: 0002-Rename-modpack-installer-icon.patch
